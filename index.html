<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毛毛日文學習助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基礎樣式：防止手機點擊高亮，設定字體，並隱藏主視窗捲動條 */
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; overflow: hidden; }
        
        /* 單字卡片樣式：設定縮放動畫與點擊時的顏色反饋 */
        .word-card { transition: all 0.2s; cursor: pointer; border: 1px solid #f1f5f9; }
        .word-card:active { transform: scale(0.97); background-color: #fff7ed; }
        
        /* 左側選單激活狀態：橘色邊框與加粗文字 */
        .nav-active { background-color: #f8fafc; color: #f59e0b; border-left: 4px solid #f59e0b; font-weight: bold; }
        
        /* 頂部標題激活狀態：底部橘色橫條 */
        .tab-active { color: #f59e0b !important; border-bottom: 3px solid #f59e0b !important; font-weight: bold !important; }
        
        /* 隱藏捲動條控制：在 Chrome/Safari/Edge 與 Firefox/IE 隱藏視覺條但保留捲動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 標題列橫向捲動核心設定 */
        #tab-bar {
            display: flex !important;
            overflow-x: auto !important; /* 開啟水平捲動 */
            overflow-y: hidden;
            white-space: nowrap !important; /* 強制內容不換行 */
            -webkit-overflow-scrolling: touch; /* 讓手機端捲動更滑順 */
            scroll-behavior: smooth; /* 點擊分類時平滑移動到該點 */
            cursor: grab; /* 電腦端滑鼠移入時顯示「手掌」圖示 */
            user-select: none; /* 防止滑鼠拖拽時選取到文字 */
        }
        #tab-bar:active { cursor: grabbing; } /* 按住拖拽時顯示「抓取」圖示 */
        #tab-bar button { flex: 0 0 auto !important; min-width: fit-content; } /* 防止按鈕被 Flexbox 壓縮變形 */

        /* 50音使用的網格佈局：一列 5 個 */
        .kana-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
      
      /* 確保內容區可以垂直捲動，並隱藏捲動條 */
#app-container {
    overflow-y: auto !important;
    height: 100%; /* 填滿剩餘空間 */
    -webkit-overflow-scrolling: touch; /* 讓手機端滑動更順暢 */
}

/* 如果想完全隱藏捲動條但保留捲動功能 */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* 修改這部分 */
.kana-card { 
    transition: all 0.1s; 
    cursor: pointer; 
    -webkit-user-select: none; /* 防止長按選取文字 */
    user-select: none;
}

/* 讓手機按下去也能變色，增加觸控回饋 */
.kana-card:active, .kana-card.touched { 
    transform: scale(0.95); 
    background-color: #fff7ed !important; 
    border-color: #f59e0b;
}
      
    </style>

        let currentMenu = 'kana'; // 當前選單指標，預設為 50音

        // 語音朗讀函式
        function speak(text) {
            if(!text) return;
            const msg = new SpeechSynthesisUtterance();
            msg.text = text; msg.lang = 'ja-JP'; msg.rate = 0.85; // 設定語言為日語，語速為 0.85
            window.speechSynthesis.cancel(); // 朗讀前先停止上一段，避免重疊
            window.speechSynthesis.speak(msg);
        }

        // 切換左側大類別選單
        function changeMenu(menu) {
            currentMenu = menu;
            // 更新按鈕樣式
            document.getElementById('menu-kana').className = "w-full py-8 text-sm text-slate-600 " + (menu === 'kana' ? 'nav-active' : '');
            document.getElementById('menu-words').className = "w-full py-8 text-sm text-slate-600 " + (menu === 'words' ? 'nav-active' : '');
            document.getElementById('menu-n5').className = "w-full py-8 text-sm text-slate-600 " + (menu === 'n5' ? 'nav-active' : '');
            document.getElementById('menu-n3').className = "w-full py-8 text-sm text-slate-600 " + (menu === 'n3' ? 'nav-active' : '');
            document.getElementById('menu-n2').className = "w-full py-8 text-sm text-slate-600 " + (menu === 'n2' ? 'nav-active' : '');
            
            // 更新頂部標題文字
            const titles = { kana: '五十音/拗音', words: '生活常用單字', n5: 'N5 檢定重要單字', n3: 'N3 檢定重要單字', n2: 'N2 檢定重要單字'  };
            document.getElementById('main-title').innerText = titles[menu];
            
            renderTabs(); // 重新生成橫向分類按鈕
        }

        // 渲染橫向分類按鈕 (tab-bar)
        function renderTabs() {
            const tabBar = document.getElementById('tab-bar');
            tabBar.innerHTML = ''; // 清空舊分類
            
            let types = [];
            if (currentMenu === 'kana') {
                types = [['seion','清音'], ['dakuon','濁音'], ['youon','拗音']];
            } else if (currentMenu === 'words') {
                // 完整 22 個生活單字分類
                types = [
                    ['animal','動物'],['marine','水族'],['plant','植物'],['nature','自然'],['vege','蔬菜'],['fruit','水果'],
                    ['food','美食'],['drink','飲料'],['cook','料理'],['tableware','餐具'],['furniture','家具'],
                    ['appliance','家電'],['clothing','衣類'],['cosmetic','美妝'],['job','職業'],['stationery','文具'],
                    ['pc','電腦'],['sport','運動'],['universe','宇宙'],['family','家族'],['body','身體'],['vehicle','交通']
                ];
            } else if (currentMenu === 'n5') {
                types = [['noun','N5 名詞'], ['adj','N5 形容詞'], ['verb','N5 動詞']];
            } else if (currentMenu === 'n3') {
                types = [['noun','名詞'],['verb_suru','名詞+する'],['adj','形容詞'],['verb','動詞'],['adv','副詞']];
            } else if (currentMenu === 'n2') {
                types = [['noun','名詞'],['verb_suru','名詞+する'],['adj','形容詞'],['verb','動詞'],['adv','副詞']];
            }
            
            // 動態創建按鈕
            types.forEach(([id, name], index) => {
                const btn = document.createElement('button');// 創建一個按鈕元件
                btn.id = 'btn-' + id;// 給按鈕一個身分證 ID，方便後面切換樣式
                // 設定按鈕樣式：內距、字體、如果是第一個按鈕(index===0)就設為選中狀態(tab-active)

                btn.className = `py-4 px-6 text-sm text-slate-500 transition-colors flex-none ${index === 0 ? 'tab-active' : ''}`;
                btn.innerText = name;// 顯示中文名稱 (例如 "動物")
                btn.onclick = () => switchTab(id);// 綁定點擊事件：點了就執行「切換分頁」功能
                tabBar.appendChild(btn);// 將按鈕放入網頁上方的選單列 (tabBar)
            });
            // 預設切換到第一個分類
            if(types.length > 0) switchTab(types[0][0]);
        }

        // 切換橫向分類與渲染單字清單
        function switchTab(type) {
            const container = document.getElementById('app-container');
            container.innerHTML = ''; // 清空舊內容
            
            // 更新分類按鈕選中樣式
            document.querySelectorAll('#tab-bar button').forEach(btn => btn.classList.remove('tab-active'));
            const activeBtn = document.getElementById('btn-' + type);
            if(activeBtn) {
                activeBtn.classList.add('tab-active');
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // 取得對應數據
            let dataSet = (currentMenu === 'kana') ? japaneseData.kana[type] : 
                          (currentMenu === 'n5') ? japaneseData.n5[type] : 
                          (currentMenu === 'n3') ? japaneseData.n3[type] : 
                          (currentMenu === 'n2') ? japaneseData.n2[type] :
            (japaneseData.words[type] || []);
            
            const realCount = dataSet.filter(i => i && (i.h || i.j)).length;
            document.getElementById('word-count').innerText = `本類 ${realCount} 筆`;

            // --- 核心修改處：渲染卡片邏輯 ---
            if (currentMenu === 'kana') {
                container.className = "flex-1 p-4 kana-grid content-start";
                dataSet.forEach(item => {
                    const card = document.createElement('div');
                    if(!item || !item.h) { card.className = "p-4"; container.appendChild(card); return; }
                    
                    card.className = "word-card bg-white p-3 rounded-lg text-center shadow-sm";
                    
                    // 語音與回饋處理
                    const handleTap = (e) => {
                        if (e.type === 'touchstart') e.preventDefault(); // 消除手機 300ms 延遲
                        speak(item.h);
                    };
                    card.onclick = handleTap; // 電腦用
                    card.ontouchstart = handleTap; // 手機用
                    
                    // 修改後的版本：加入 item.k (片假名)
                    card.innerHTML = `
                    <div class="text-2xl font-bold text-slate-800">${item.h}</div>
                    <div class="text-xs text-slate-400 font-medium">${item.k || ''}</div>
                    <div class="text-[10px] text-orange-400 font-mono">${item.r}</div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.className = "flex-1 p-4 space-y-3 content-start";
                dataSet.forEach(item => {
                    if(!item) return;
                    const card = document.createElement('div');
                    card.className = 'word-card bg-white p-4 rounded-xl shadow-sm flex flex-col w-full gap-2';
                    
                    // 語音與回饋處理
                    const handleTap = (e) => {
                        if (e.type === 'touchstart') e.preventDefault(); // 消除手機 300ms 延遲
                        speak(item.j);
                    };
                    card.onclick = handleTap; // 電腦用
                    card.ontouchstart = handleTap; // 手機用

                    card.innerHTML = `
                        <div class="flex justify-between items-center w-full">
                            <div class="flex-1 min-w-0 pr-3">
                                <div class="text-[10px] text-orange-500 font-mono tracking-widest">${item.r}</div>
                                <div class="text-xl font-bold text-slate-800">${item.j} <span class="text-sm font-normal text-slate-400">(${item.f})</span></div>
                            </div>
                            <div class="bg-orange-50 px-3 py-2 rounded-lg text-orange-600 text-sm font-bold flex-shrink-0">${item.c}</div>
                        </div>
                        ${item.s ? `
                        <div class="mt-2 pt-2 border-t border-slate-100">
                            <div class="flex items-start gap-2">
                                <span class="bg-blue-100 text-blue-600 text-[10px] px-1.5 py-0.5 rounded mt-1">例</span>
                                <div class="text-sm text-slate-600 leading-relaxed">
                                    <div class="font-medium">${item.s}</div>
                                    <div class="text-xs text-slate-400">${item.st || ''}</div>
                                </div>
                            </div>
                        </div>
                        ` : ''}
                    `;
                    container.appendChild(card);
                });
            }
        }

        // --- 電腦端滑鼠交互增強代碼 ---
        const scrollContainer = document.getElementById('tab-bar');
        let isDown = false, startX, scrollLeft;

        // 滑鼠點擊標題列開始拖拽
        scrollContainer.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - scrollContainer.offsetLeft;
            scrollLeft = scrollContainer.scrollLeft;
            scrollContainer.style.scrollBehavior = 'auto'; // 拖拽時取消平滑，增加跟手感
        });

        // 釋放滑鼠或移出視窗
        window.addEventListener('mouseup', () => { 
            isDown = false; 
            scrollContainer.style.scrollBehavior = 'smooth'; 
        });

        // 滑鼠移動處理 (計算拖拽位移)
        scrollContainer.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - scrollContainer.offsetLeft;
            const walk = (x - startX) * 2; // 2 為滾動速度係數
            scrollContainer.scrollLeft = scrollLeft - walk;
        });

        // 支援滑鼠滾輪：轉垂直滾動為水平滾動
        scrollContainer.addEventListener('wheel', (evt) => {
            if (evt.deltaY !== 0) {
                evt.preventDefault();
                scrollContainer.scrollLeft += evt.deltaY;
            }
        }, { passive: false });
      
      

        // 初始化：進入頁面後預設載入 50音
        changeMenu('kana');
    </script>
</body>
